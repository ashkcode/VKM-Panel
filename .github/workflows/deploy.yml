name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
        env:
          VITE_FIREBASE_API_KEY: AIzaSyAUjQRXi_A8wHSW7cZoWG85xzLHmI49WQ0
          VITE_FIREBASE_AUTH_DOMAIN: localdb-pro.firebaseapp.com
          VITE_FIREBASE_PROJECT_ID: localdb-pro
          VITE_FIREBASE_STORAGE_BUCKET: localdb-pro.firebasestorage.app
          VITE_FIREBASE_MESSAGING_SENDER_ID: "334689487080"
          VITE_FIREBASE_APP_ID: "1:334689487080:web:0a4b2efa8125cb74de615d"
          VITE_VKM_ENABLE_IMPORT: "true"
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
